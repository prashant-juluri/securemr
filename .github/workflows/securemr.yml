name: SecureMR Self Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  securemr:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build SecureMR container
        run: |
          docker build -t securemr .

      - name: Run SecureMR on repository
        run: |
          docker run \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -v ${{ github.workspace }}:/target \
            securemr python securemr.py /target