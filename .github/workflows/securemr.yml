name: SecureMR Self Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  securemr:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build SecureMR container
        run: |
          docker build -t securemr .

      - name: Run SecureMR on repository
        name: SecureMR

on:
  pull_request:

jobs:

  security:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SecureMR
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_REPOSITORY=${{ github.repository }} \
            -e GITHUB_EVENT_PATH=${{ github.event_path }} \
            -v ${{ github.workspace }}:/target \
            prashantjuluri/securemr:latest \
            python securemr.py /target